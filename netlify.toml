# Netlify hosts only the edge functions in this project — the SPA itself is
# served from Apache, so we skip the SPA build here and publish a 1-byte stub
# instead. Cuts deploy size from ~50 JS chunks to a single placeholder file.
# Local dev still runs the real Vite build via the [dev] section below.
[build]
  command = "mkdir -p dist && printf '<!doctype html><title>Edge functions only</title>' > dist/index.html"
  publish = "dist"

[[edge_functions]]
  path = "/api/chat"
  function = "chat"

[[edge_functions]]
  path = "/api/web-search"
  function = "web-search"

[[edge_functions]]
  path = "/api/embeddings"
  function = "embeddings"

[dev]
  command = "npm run dev"
  targetPort = 8080
  port = 8888
  publish = "dist"
