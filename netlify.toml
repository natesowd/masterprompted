[build]
  command = "npm run build"
  publish = "dist"

[[edge_functions]]
  path = "/api/chat"
  function = "chat"

[[edge_functions]]
  path = "/api/web-search"
  function = "web-search"

[[edge_functions]]
  path = "/api/embeddings"
  function = "embeddings"

[dev]
  command = "npm run dev"
  targetPort = 8080
  port = 8888
  publish = "dist"
